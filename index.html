<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maths Practice 🧮</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      color: white;
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .subtitle {
      color: rgba(255,255,255,0.85);
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }

    .ops {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .op-btn {
      padding: 10px 20px;
      border: 3px solid #e0e0e0;
      border-radius: 50px;
      font-size: 1.1rem;
      cursor: pointer;
      background: white;
      color: #555;
      transition: all 0.2s;
      font-weight: 600;
    }
    .op-btn:hover { border-color: #667eea; color: #667eea; }
    .op-btn.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
      color: white;
    }

    .prev-feedback {
      min-height: 40px;
      font-size: 1.15rem;
      font-weight: 700;
      border-radius: 12px;
      padding: 8px 16px;
      margin-bottom: 18px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .prev-feedback.visible { opacity: 1; }
    .prev-feedback.correct { background: #f0fdf4; color: #16a34a; border: 2px solid #bbf7d0; }
    .prev-feedback.wrong   { background: #fef2f2; color: #dc2626; border: 2px solid #fecaca; }

    .question {
      font-size: 3rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 24px;
      min-height: 60px;
    }

    .answer-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }

    #answer {
      font-size: 2rem;
      width: 140px;
      padding: 12px 16px;
      border: 3px solid #e0e0e0;
      border-radius: 16px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }
    #answer:focus { border-color: #667eea; }

    #check-btn {
      padding: 14px 28px;
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(102,126,234,0.5);
    }
    #check-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.6); }
    #check-btn:active { transform: translateY(0); }

    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: #f8f8fc;
      border-radius: 16px;
      margin-top: 8px;
      margin-bottom: 10px;
    }

    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: #f1f5f9;
      border-radius: 16px;
      margin-bottom: 16px;
    }

    .score-item { text-align: center; }
    .score-num { font-size: 1.6rem; font-weight: 800; color: #333; }
    .stat-num  { font-size: 1.25rem; font-weight: 800; color: #333; }
    .score-label, .stat-label { font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }

    .streak-num   { color: #f59e0b; }
    .correct-num  { color: #22c55e; }
    .wrong-num    { color: #ef4444; }
    .accuracy-num { color: #667eea; }
    .time-num     { color: #0ea5e9; }

    /* Bell curve */
    .bell-wrap {
      border-radius: 16px;
      background: #f8faff;
      border: 1.5px solid #e0e7ff;
      padding: 12px 12px 6px;
    }

    .bell-title {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    #bell-canvas {
      width: 100%;
      height: 110px;
      display: block;
    }

    .bell-hint {
      font-size: 0.72rem;
      color: #aaa;
      margin-top: 4px;
    }

    .emoji-pop {
      position: fixed;
      font-size: 3rem;
      pointer-events: none;
      animation: floatUp 1s ease-out forwards;
      z-index: 999;
    }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-120px) scale(1.5); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-6px); }
      80%      { transform: translateX(6px); }
    }
    .shake { animation: shake 0.35s ease; }
  </style>
</head>
<body>

<h1>🧮 Maths Practice</h1>
<p class="subtitle">Let's get those brain muscles going!</p>

<div class="card">
  <div class="ops">
    <button class="op-btn active" data-op="+" onclick="setOp(this)">➕ Add</button>
    <button class="op-btn" data-op="-" onclick="setOp(this)">➖ Subtract</button>
    <button class="op-btn" data-op="×" onclick="setOp(this)">✖️ Multiply</button>
    <button class="op-btn" data-op="÷" onclick="setOp(this)">➗ Divide</button>
  </div>

  <div class="prev-feedback" id="prev-feedback"></div>

  <div class="question" id="question">Loading...</div>

  <div class="answer-row">
    <input type="text" inputmode="numeric" pattern="[0-9]*" id="answer" placeholder="?" autocomplete="off" />
    <button id="check-btn" onclick="checkAnswer()">Check ✅</button>
  </div>

  <!-- Row 1: correct / wrong / streak -->
  <div class="score-bar">
    <div class="score-item">
      <div class="score-num correct-num" id="correct-count">0</div>
      <div class="score-label">Correct</div>
    </div>
    <div class="score-item">
      <div class="score-num wrong-num" id="wrong-count">0</div>
      <div class="score-label">Wrong</div>
    </div>
    <div class="score-item">
      <div class="score-num streak-num" id="streak-count">0</div>
      <div class="score-label">🔥 Streak</div>
    </div>
  </div>

  <!-- Row 2: accuracy / avg time / stddev -->
  <div class="stats-bar">
    <div class="score-item">
      <div class="stat-num accuracy-num" id="accuracy">—</div>
      <div class="stat-label">Accuracy</div>
    </div>
    <div class="score-item">
      <div class="stat-num time-num" id="avg-time">—</div>
      <div class="stat-label">Avg Time</div>
    </div>
    <div class="score-item">
      <div class="stat-num time-num" id="stddev-time">—</div>
      <div class="stat-label">Std Dev</div>
    </div>
  </div>

  <!-- Bell curve -->
  <div class="bell-wrap" id="bell-wrap" style="display:none;">
    <div class="bell-title">Response Time Distribution</div>
    <canvas id="bell-canvas"></canvas>
    <div class="bell-hint" id="bell-hint"></div>
  </div>
</div>

<script>
  let op = '+';
  let a = 0, b = 0, correctAnswer = 0;
  let correct = 0, wrong = 0, streak = 0;
  let questionStartTime = null;
  let answerTimes = [];
  let lastTime = null;
  let lastWasCorrect = null;

  const opRanges = {
    '+': () => ({ a: rand(1, 20), b: rand(1, 20) }),
    '-': () => { let x = rand(5, 20), y = rand(1, x); return { a: x, b: y }; },
    '×': () => ({ a: rand(1, 10), b: rand(1, 10) }),
    '÷': () => { let d = rand(1, 10), q = rand(1, 10); return { a: d * q, b: d }; }
  };

  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  function mean(arr) { return arr.reduce((s, v) => s + v, 0) / arr.length; }

  function stddev(arr) {
    if (arr.length < 2) return null;
    const m = mean(arr);
    return Math.sqrt(arr.reduce((s, v) => s + (v - m) ** 2, 0) / arr.length);
  }

  function formatTime(s) { return s.toFixed(1) + 's'; }

  // Normal distribution PDF
  function normPDF(x, mu, sigma) {
    return (1 / (sigma * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * ((x - mu) / sigma) ** 2);
  }

  function drawBellCurve() {
    if (answerTimes.length < 2) return;

    const mu = mean(answerTimes);
    const sd = stddev(answerTimes);
    if (!sd || sd === 0) return;

    const canvas = document.getElementById('bell-canvas');
    // Set physical pixel size for sharpness
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width  = rect.width  * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const W = rect.width;
    const H = rect.height;
    const padX = 28, padTop = 10, padBot = 22;
    const plotW = W - padX * 2;
    const plotH = H - padTop - padBot;

    // X range: mu ± 3.5 sigma, but always include lastTime
    let xMin = mu - 3.5 * sd;
    let xMax = mu + 3.5 * sd;
    if (lastTime !== null) {
      xMin = Math.min(xMin, lastTime - sd * 0.5);
      xMax = Math.max(xMax, lastTime + sd * 0.5);
    }
    xMin = Math.max(0, xMin);

    const steps = 300;
    const dx = (xMax - xMin) / steps;

    // Compute Y values
    const ys = [];
    for (let i = 0; i <= steps; i++) {
      ys.push(normPDF(xMin + i * dx, mu, sd));
    }
    const yMax = Math.max(...ys);

    function toCanvasX(x) { return padX + ((x - xMin) / (xMax - xMin)) * plotW; }
    function toCanvasY(y) { return padTop + plotH - (y / yMax) * plotH; }

    ctx.clearRect(0, 0, W, H);

    // --- Shaded area under curve (full) ---
    ctx.beginPath();
    ctx.moveTo(toCanvasX(xMin), toCanvasY(0));
    for (let i = 0; i <= steps; i++) {
      ctx.lineTo(toCanvasX(xMin + i * dx), toCanvasY(ys[i]));
    }
    ctx.lineTo(toCanvasX(xMax), toCanvasY(0));
    ctx.closePath();
    ctx.fillStyle = 'rgba(102,126,234,0.12)';
    ctx.fill();

    // --- Highlight region: last answer time ± some visual band ---
    if (lastTime !== null) {
      const highlightColor = lastWasCorrect ? 'rgba(34,197,94,0.25)' : 'rgba(239,68,68,0.25)';
      // Shade from xMin up to lastTime (cumulative feel)
      ctx.beginPath();
      const tStart = Math.max(xMin, lastTime - dx);
      const tEnd   = Math.min(xMax, lastTime + dx);
      // Draw a narrow vertical band at lastTime
      const lx = toCanvasX(lastTime);
      ctx.beginPath();
      // Fill area under curve up to lastTime
      ctx.moveTo(toCanvasX(xMin), toCanvasY(0));
      for (let i = 0; i <= steps; i++) {
        const xi = xMin + i * dx;
        if (xi > lastTime) break;
        ctx.lineTo(toCanvasX(xi), toCanvasY(ys[i]));
      }
      // Interpolate exactly to lastTime
      const fracIdx = (lastTime - xMin) / dx;
      const i0 = Math.floor(fracIdx);
      const frac = fracIdx - i0;
      const yAtLast = i0 < ys.length - 1
        ? ys[i0] + frac * (ys[i0 + 1] - ys[i0])
        : ys[ys.length - 1];
      ctx.lineTo(toCanvasX(lastTime), toCanvasY(yAtLast));
      ctx.lineTo(toCanvasX(lastTime), toCanvasY(0));
      ctx.closePath();
      ctx.fillStyle = lastWasCorrect ? 'rgba(34,197,94,0.18)' : 'rgba(239,68,68,0.18)';
      ctx.fill();
    }

    // --- Bell curve line ---
    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
      const cx = toCanvasX(xMin + i * dx);
      const cy = toCanvasY(ys[i]);
      i === 0 ? ctx.moveTo(cx, cy) : ctx.lineTo(cx, cy);
    }
    ctx.strokeStyle = '#667eea';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // --- Mean line ---
    const mx = toCanvasX(mu);
    ctx.beginPath();
    ctx.moveTo(mx, padTop);
    ctx.lineTo(mx, padTop + plotH);
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]);
    ctx.stroke();
    ctx.setLineDash([]);

    // --- Last answer time marker ---
    if (lastTime !== null) {
      const lx = toCanvasX(lastTime);
      const fracIdx = (lastTime - xMin) / dx;
      const i0 = Math.floor(Math.max(0, Math.min(steps - 1, fracIdx)));
      const frac = fracIdx - i0;
      const yAtLast = i0 < ys.length - 1
        ? ys[i0] + frac * (ys[i0 + 1] - ys[i0])
        : ys[ys.length - 1];
      const ly = toCanvasY(yAtLast);

      const dotColor = lastWasCorrect ? '#22c55e' : '#ef4444';

      // Vertical line from baseline to dot
      ctx.beginPath();
      ctx.moveTo(lx, padTop + plotH);
      ctx.lineTo(lx, ly);
      ctx.strokeStyle = dotColor;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Dot on curve
      ctx.beginPath();
      ctx.arc(lx, ly, 6, 0, Math.PI * 2);
      ctx.fillStyle = dotColor;
      ctx.fill();
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Time label above dot
      ctx.fillStyle = dotColor;
      ctx.font = 'bold 11px Segoe UI, sans-serif';
      ctx.textAlign = lx > W * 0.75 ? 'right' : lx < W * 0.25 ? 'left' : 'center';
      ctx.fillText(formatTime(lastTime), lx, Math.max(padTop + 10, ly - 10));
    }

    // --- X axis labels ---
    ctx.fillStyle = '#aaa';
    ctx.font = '10px Segoe UI, sans-serif';
    ctx.textAlign = 'center';
    // Show labels at mu-2sd, mu-sd, mu, mu+sd, mu+2sd
    [-2, -1, 0, 1, 2].forEach(n => {
      const xVal = mu + n * sd;
      if (xVal < xMin || xVal > xMax) return;
      const cx = toCanvasX(xVal);
      ctx.fillStyle = n === 0 ? '#667eea' : '#bbb';
      ctx.fillText(formatTime(xVal), cx, H - 4);
    });

    // Update hint
    const zScore = lastTime !== null ? ((lastTime - mu) / sd) : null;
    const bellWrap = document.getElementById('bell-wrap');
    bellWrap.style.display = 'block';

    if (zScore !== null) {
      const pct = Math.round(normCDF(zScore) * 100);
      const hintEl = document.getElementById('bell-hint');
      const fasterSlower = zScore < 0 ? 'faster' : 'slower';
      hintEl.textContent = `Last answer (${formatTime(lastTime)}) was ${fasterSlower} than ${zScore < 0 ? 100 - pct : pct}% of answers`;
    }
  }

  // Approximation of the normal CDF using error function
  function normCDF(z) {
    return 0.5 * (1 + erf(z / Math.sqrt(2)));
  }

  function erf(x) {
    // Abramowitz & Stegun approximation
    const t = 1 / (1 + 0.3275911 * Math.abs(x));
    const poly = t * (0.254829592 + t * (-0.284496736 + t * (1.421413741 + t * (-1.453152027 + t * 1.061405429))));
    const result = 1 - poly * Math.exp(-x * x);
    return x >= 0 ? result : -result;
  }

  function updateStats() {
    const total = correct + wrong;
    document.getElementById('correct-count').textContent = correct;
    document.getElementById('wrong-count').textContent = wrong;
    document.getElementById('streak-count').textContent = streak;
    document.getElementById('accuracy').textContent = total > 0
      ? Math.round((correct / total) * 100) + '%' : '—';

    if (answerTimes.length > 0) {
      document.getElementById('avg-time').textContent = formatTime(mean(answerTimes));
      const sd = stddev(answerTimes);
      document.getElementById('stddev-time').textContent = sd !== null ? formatTime(sd) : '—';
    }

    drawBellCurve();
  }

  function setOp(btn) {
    document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    op = btn.dataset.op;
    clearFeedback();
    generateQuestion();
  }

  function clearFeedback() {
    const fb = document.getElementById('prev-feedback');
    fb.className = 'prev-feedback';
    fb.textContent = '';
  }

  function generateQuestion() {
    const { a: x, b: y } = opRanges[op]();
    a = x; b = y;
    if (op === '+') correctAnswer = a + b;
    else if (op === '-') correctAnswer = a - b;
    else if (op === '×') correctAnswer = a * b;
    else if (op === '÷') correctAnswer = a / b;

    document.getElementById('question').textContent = `${a} ${op} ${b} = ?`;
    const answerEl = document.getElementById('answer');
    answerEl.value = '';
    answerEl.disabled = false;
    answerEl.focus();
    questionStartTime = performance.now();
  }

  function checkAnswer() {
    const answerEl = document.getElementById('answer');
    const input = answerEl.value.trim();
    if (input === '') return;

    const elapsed = (performance.now() - questionStartTime) / 1000;
    answerTimes.push(elapsed);
    lastTime = elapsed;

    const userAnswer = parseFloat(input);
    const fb = document.getElementById('prev-feedback');

    if (userAnswer === correctAnswer) {
      correct++;
      streak++;
      lastWasCorrect = true;
      fb.textContent = streak >= 3
        ? `🔥 ${a} ${op} ${b} = ${correctAnswer} — Correct! ${streak} in a row! (${formatTime(elapsed)})`
        : `✅ ${a} ${op} ${b} = ${correctAnswer} — Correct! (${formatTime(elapsed)})`;
      fb.className = 'prev-feedback correct visible';
      spawnEmoji(streak >= 5 ? '🌟' : '⭐');
    } else {
      wrong++;
      streak = 0;
      lastWasCorrect = false;
      fb.textContent = `❌ ${a} ${op} ${b} = ${correctAnswer} — you said ${userAnswer} (${formatTime(elapsed)})`;
      fb.className = 'prev-feedback wrong visible';
      answerEl.classList.add('shake');
      setTimeout(() => answerEl.classList.remove('shake'), 350);
    }

    updateStats();
    generateQuestion();
  }

  function spawnEmoji(emoji) {
    const el = document.createElement('div');
    el.className = 'emoji-pop';
    el.textContent = emoji;
    el.style.left = (Math.random() * 60 + 20) + 'vw';
    el.style.top = '50vh';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }

  document.getElementById('answer').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkAnswer();
  });

  // Redraw bell curve on resize
  window.addEventListener('resize', () => { if (answerTimes.length >= 2) drawBellCurve(); });

  generateQuestion();
</script>
</body>
</html>
