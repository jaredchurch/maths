<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maths Practice 🧮</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      color: white;
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .subtitle {
      color: rgba(255,255,255,0.85);
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }

    .ops {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .op-btn {
      padding: 10px 20px;
      border: 3px solid #e0e0e0;
      border-radius: 50px;
      font-size: 1.1rem;
      cursor: pointer;
      background: white;
      color: #555;
      transition: all 0.2s;
      font-weight: 600;
    }

    .op-btn:hover { border-color: #667eea; color: #667eea; }
    .op-btn.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
      color: white;
    }

    /* Previous answer feedback banner */
    .prev-feedback {
      min-height: 40px;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 12px;
      padding: 8px 16px;
      margin-bottom: 18px;
      transition: opacity 0.3s;
      opacity: 0;
    }
    .prev-feedback.visible { opacity: 1; }
    .prev-feedback.correct {
      background: #f0fdf4;
      color: #16a34a;
      border: 2px solid #bbf7d0;
    }
    .prev-feedback.wrong {
      background: #fef2f2;
      color: #dc2626;
      border: 2px solid #fecaca;
    }

    .question {
      font-size: 3rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 24px;
      min-height: 60px;
    }

    .answer-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }

    #answer {
      font-size: 2rem;
      width: 140px;
      padding: 12px 16px;
      border: 3px solid #e0e0e0;
      border-radius: 16px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    #answer:focus { border-color: #667eea; }

    #check-btn {
      padding: 14px 28px;
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(102,126,234,0.5);
    }

    #check-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.6); }
    #check-btn:active { transform: translateY(0); }

    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: #f8f8fc;
      border-radius: 16px;
      margin-top: 8px;
    }

    .score-item { text-align: center; }

    .score-num {
      font-size: 1.6rem;
      font-weight: 800;
      color: #333;
    }

    .score-label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .streak-num { color: #f59e0b; }
    .correct-num { color: #22c55e; }
    .wrong-num { color: #ef4444; }

    .emoji-pop {
      position: fixed;
      font-size: 3rem;
      pointer-events: none;
      animation: floatUp 1s ease-out forwards;
      z-index: 999;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-120px) scale(1.5); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.35s ease; }
  </style>
</head>
<body>

<h1>🧮 Maths Practice</h1>
<p class="subtitle">Let's get those brain muscles going!</p>

<div class="card">
  <div class="ops">
    <button class="op-btn active" data-op="+" onclick="setOp(this)">➕ Add</button>
    <button class="op-btn" data-op="-" onclick="setOp(this)">➖ Subtract</button>
    <button class="op-btn" data-op="×" onclick="setOp(this)">✖️ Multiply</button>
    <button class="op-btn" data-op="÷" onclick="setOp(this)">➗ Divide</button>
  </div>

  <!-- Shows result of PREVIOUS answer while new question is ready -->
  <div class="prev-feedback" id="prev-feedback"></div>

  <div class="question" id="question">Loading...</div>

  <div class="answer-row">
    <input type="number" id="answer" placeholder="?" autocomplete="off" />
    <button id="check-btn" onclick="checkAnswer()">Check ✅</button>
  </div>

  <div class="score-bar">
    <div class="score-item">
      <div class="score-num correct-num" id="correct-count">0</div>
      <div class="score-label">Correct</div>
    </div>
    <div class="score-item">
      <div class="score-num wrong-num" id="wrong-count">0</div>
      <div class="score-label">Wrong</div>
    </div>
    <div class="score-item">
      <div class="score-num streak-num" id="streak-count">0</div>
      <div class="score-label">🔥 Streak</div>
    </div>
  </div>
</div>

<script>
  let op = '+';
  let a = 0, b = 0, correctAnswer = 0;
  let correct = 0, wrong = 0, streak = 0;

  const opRanges = {
    '+': () => ({ a: rand(1, 20), b: rand(1, 20) }),
    '-': () => { let x = rand(5, 20), y = rand(1, x); return { a: x, b: y }; },
    '×': () => ({ a: rand(1, 10), b: rand(1, 10) }),
    '÷': () => { let d = rand(1, 10), q = rand(1, 10); return { a: d * q, b: d }; }
  };

  function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function setOp(btn) {
    document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    op = btn.dataset.op;
    clearFeedback();
    generateQuestion();
  }

  function clearFeedback() {
    const fb = document.getElementById('prev-feedback');
    fb.className = 'prev-feedback';
    fb.textContent = '';
  }

  function generateQuestion() {
    const { a: x, b: y } = opRanges[op]();
    a = x; b = y;
    if (op === '+') correctAnswer = a + b;
    else if (op === '-') correctAnswer = a - b;
    else if (op === '×') correctAnswer = a * b;
    else if (op === '÷') correctAnswer = a / b;

    document.getElementById('question').textContent = `${a} ${op} ${b} = ?`;
    const answerEl = document.getElementById('answer');
    answerEl.value = '';
    answerEl.disabled = false;
    answerEl.focus();
  }

  function checkAnswer() {
    const answerEl = document.getElementById('answer');
    const input = answerEl.value.trim();
    if (input === '') return;

    const userAnswer = parseFloat(input);
    const fb = document.getElementById('prev-feedback');

    if (userAnswer === correctAnswer) {
      correct++;
      streak++;
      fb.textContent = streak >= 3
        ? `🔥 ${a} ${op} ${b} = ${correctAnswer} — Correct! ${streak} in a row!`
        : `✅ ${a} ${op} ${b} = ${correctAnswer} — Correct!`;
      fb.className = 'prev-feedback correct visible';
      spawnEmoji(streak >= 5 ? '🌟' : '⭐');
    } else {
      wrong++;
      streak = 0;
      fb.textContent = `❌ ${a} ${op} ${b} = ${correctAnswer} — you said ${userAnswer}`;
      fb.className = 'prev-feedback wrong visible';
      answerEl.classList.add('shake');
      setTimeout(() => answerEl.classList.remove('shake'), 350);
    }

    document.getElementById('correct-count').textContent = correct;
    document.getElementById('wrong-count').textContent = wrong;
    document.getElementById('streak-count').textContent = streak;

    // Immediately load next question — feedback stays visible above
    generateQuestion();
  }

  function spawnEmoji(emoji) {
    const el = document.createElement('div');
    el.className = 'emoji-pop';
    el.textContent = emoji;
    el.style.left = (Math.random() * 60 + 20) + 'vw';
    el.style.top = '50vh';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }

  document.getElementById('answer').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkAnswer();
  });

  generateQuestion();
</script>
</body>
</html>
